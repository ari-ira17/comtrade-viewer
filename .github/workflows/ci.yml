name: COMTRADE Viewer CI Pipeline

on:
  pull_request:

permissions:
  pull-requests: write
  contents: read
  checks: write

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Check format
        run: dotnet format comtrade-viewer.slnx --verify-no-changes

      - name: Build
        run: dotnet build comtrade-viewer.slnx --configuration Release -f net10.0

      - name: Test
        run: dotnet test comtrade-viewer.slnx --configuration Release --no-build --framework net10.0 --verbosity normal --logger trx --collect:"XPlat Code Coverage" --results-directory ./TestResults /p:DeterministicSourcePaths=true

      - name: Test Results Visualization
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Tests Report
          path: "TestResults/*.trx"
          reporter: dotnet-trx

      - name: Generate Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: success() || failure()
        with:
          filename: "TestResults/**/*.cobertura.xml"
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "90 100"

      - name: Publish Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: always()
        with:
          recreate: true
          path: code-coverage-results.md
          